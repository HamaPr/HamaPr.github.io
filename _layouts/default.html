<!-- Mermaid 차트 스크립트 (최종 강화판: 특수문자 자동 해독 기능 추가) -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

  const config = {
    startOnLoad: false,
    theme: 'dark',
    securityLevel: 'loose',
    fontFamily: 'Pretendard'
  };
  mermaid.initialize(config);

  document.addEventListener('DOMContentLoaded', async () => {
    const elements = document.querySelectorAll('pre code.language-mermaid');
    const nodesToProcess = [];

    for (const el of elements) {
      const pre = el.closest('pre');
      const parent = pre.parentElement;

      // [핵심 수정] HTML 엔티티(&quot; 등)를 원래 문자로 복구
      const txtArea = document.createElement("textarea");
      txtArea.innerHTML = el.innerHTML; // innerHTML로 읽어서
      const graphDef = txtArea.value;   // value로 꺼내면 엔티티가 해독됨

      const newDiv = document.createElement('div');
      newDiv.className = 'mermaid';
      newDiv.textContent = graphDef;

      if (parent && parent.classList.contains('highlighter-rouge')) {
           parent.replaceWith(newDiv);
      } else if (pre) {
           pre.replaceWith(newDiv);
      }
      
      nodesToProcess.push(newDiv);
    }

    if (nodesToProcess.length > 0) {
      try {
        await mermaid.run({ nodes: nodesToProcess });
      } catch (error) {
        console.error("Mermaid 렌더링 에러:", error);
      }
    }
  });
</script>
