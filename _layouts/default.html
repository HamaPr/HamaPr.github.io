<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    html,
    body {
      background-color: #202124;
    }
  </style>
  <meta name="theme-color" content="#202124" media="(prefers-color-scheme: dark)">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23FFC0CB'/><circle cx='50' cy='65' r='28' fill='%23d4d4d8'/><path d='M35,32 l5,-10 l10,10 l10,-10 l5,10 z' fill='%23FFD700' stroke='%23F7B500' stroke-width='2'/><circle cx='38' cy='58' r='5' fill='white'/><circle cx='62' cy='58' r='5' fill='white'/><circle cx='38' cy='58' r='2' fill='black'/><circle cx='62' cy='58' r='2' fill='black'/><circle cx='35' cy='70' r='3' fill='%23b0a8b9'/><circle cx='65' cy='70' r='3' fill='%23b0a8b9'/></svg>">
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css">

  {% seo %}
</head>

<body>
  {% include header.html %}
  <main class="page-wrapper" aria-label="Content">
    {{ content }}
  </main>
  {% include footer.html %}
  <a id="back-to-top" href="#">↑</a>
  <script src="/assets/js/script.js"></script>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false });

    document.addEventListener('DOMContentLoaded', () => {
      const mermaidElements = document.querySelectorAll('pre code.language-mermaid, div.language-mermaid pre code');

      mermaidElements.forEach(el => {
        const graphDefinition = el.textContent;
        const newDiv = document.createElement('div');
        newDiv.className = 'mermaid';
        newDiv.textContent = graphDefinition;

        // Find the parent container to replace (usually div.highlighter-rouge or pre)
        const container = el.closest('div.highlighter-rouge') || el.closest('pre');
        if (container) {
          container.parentNode.replaceChild(newDiv, container);
        }
      });

      mermaid.run();
    });
  </script>


</body>

</html>
