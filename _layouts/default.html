<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    html,
    body {
      background-color: #202124;
    }
  </style>
  <meta name="theme-color" content="#202124" media="(prefers-color-scheme: dark)">
  
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FFC0CB'/%3E%3Ccircle cx='50' cy='65' r='28' fill='%23d4d4d8'/%3E%3Cpath d='M35,32 l5,-10 l10,10 l10,-10 l5,10 z' fill='%23FFD700' stroke='%23F7B500' stroke-width='2'/%3E%3Ccircle cx='38' cy='58' r='5' fill='white'/%3E%3Ccircle cx='62' cy='58' r='5' fill='white'/%3E%3Ccircle cx='38' cy='58' r='2' fill='black'/%3E%3Ccircle cx='62' cy='58' r='2' fill='black'/%3E%3Ccircle cx='35' cy='70' r='3' fill='%23b0a8b9'/%3E%3Ccircle cx='65' cy='70' r='3' fill='%23b0a8b9'/%3E%3C/svg%3E">
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css">

  {% seo %}
</head>

<body>
  {% include header.html %}
  <main class="page-wrapper" aria-label="Content">
    {{ content }}
  </main>
  {% include footer.html %}
  <a id="back-to-top" href="#">↑</a>
  <script src="/assets/js/script.js"></script>

  <!-- Mermaid Script 수정됨 -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    // 1. 초기화 (자동 로드 방지)
    mermaid.initialize({ 
      startOnLoad: false,
      theme: 'dark' // 다크 모드 테마 적용
    });

    document.addEventListener('DOMContentLoaded', async () => {
      // 2. Jekyll이 생성한 코드 블록 찾기 (language-mermaid 클래스가 있는 code 태그)
      const mermaidCodeBlocks = document.querySelectorAll('pre code.language-mermaid');

      for (const codeBlock of mermaidCodeBlocks) {
        // 그래프 코드 추출
        const graphDefinition = codeBlock.textContent;
        
        // 새로운 div 생성 (Mermaid가 렌더링할 컨테이너)
        const newDiv = document.createElement('div');
        newDiv.className = 'mermaid';
        newDiv.textContent = graphDefinition;

        // 3. 기존의 pre/code 태그를 새로운 div로 교체
        // Jekyll은 보통 div.highlighter-rouge > div.highlight > pre > code 구조를 가짐
        const preElement = codeBlock.closest('pre');
        const wrapperDiv = preElement.closest('div.highlighter-rouge') || preElement;
        
        if (wrapperDiv && wrapperDiv.parentNode) {
          wrapperDiv.parentNode.replaceChild(newDiv, wrapperDiv);
        }
      }

      // 4. 변환된 div들에 대해 렌더링 실행
      await mermaid.run({
        nodes: document.querySelectorAll('.mermaid')
      });
    });
  </script>

</body>

</html>
