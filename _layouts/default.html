<!DOCTYPE html>
<html lang="ko" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    html, body { background-color: #202124; }
  </style>
  <meta name="theme-color" content="#202124" media="(prefers-color-scheme: dark)">

  <!-- 1. 파비콘 오류 완벽 해결 (특수문자 제거 버전) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23FFC0CB'/%3E%3Ccircle cx='50' cy='65' r='28' fill='%23d4d4d8'/%3E%3Cpath d='M35,32 l5,-10 l10,10 l10,-10 l5,10 z' fill='%23FFD700' stroke='%23F7B500' stroke-width='2'/%3E%3Ccircle cx='38' cy='58' r='5' fill='white'/%3E%3Ccircle cx='62' cy='58' r='5' fill='white'/%3E%3Ccircle cx='38' cy='58' r='2' fill='black'/%3E%3Ccircle cx='62' cy='58' r='2' fill='black'/%3E%3Ccircle cx='35' cy='70' r='3' fill='%23b0a8b9'/%3E%3Ccircle cx='65' cy='70' r='3' fill='%23b0a8b9'/%3E%3C/svg%3E">

  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css">

  {% seo %}
</head>

<body>
  {% include header.html %}
  
  <main class="page-wrapper" aria-label="Content">
    {{ content }}
  </main>
  
  {% include footer.html %}
  
  <a id="back-to-top" href="#">↑</a>
  <script src="/assets/js/script.js"></script>

  <!-- 2. Mermaid 스크립트: 호환성 높은 버전으로 교체 -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // 초기화
      mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'dark'
      });

      // Jekyll 코드 블록 찾기 (pre > code 구조)
      var codeBlocks = document.querySelectorAll('pre code.language-mermaid');
      
      codeBlocks.forEach(function (codeBlock) {
        var pre = codeBlock.parentElement; // <pre> 태그
        var container = pre.parentElement; // div.highlighter-rouge 등
        
        // 그래프 코드 가져오기
        var graphDefinition = codeBlock.textContent;
        
        // 새로운 div 만들기
        var newDiv = document.createElement('div');
        newDiv.className = 'mermaid';
        newDiv.textContent = graphDefinition;

        // 기존 코드 블록을 새 div로 교체
        if (container && container.parentNode) {
          container.parentNode.replaceChild(newDiv, container);
        } else if (pre && pre.parentNode) {
            pre.parentNode.replaceChild(newDiv, pre);
        }
      });

      // 렌더링 실행
      mermaid.run();
    });
  </script>
</body>
</html>
