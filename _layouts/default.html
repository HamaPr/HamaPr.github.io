<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style> html, body { background-color: #202428; } </style>
  <meta name="theme-color" content="#202124" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="data:image/svg+xml,..."> <!-- 내용은 생략 -->
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <pre>{{ site.categories | inspect }}</pre>
  {% include header.html %}

  <!-- [수정] Liquid 조건문을 사용해 post 레이아웃일 때와 아닐 때를 구분합니다. -->
  <main aria-label="Content">
    {% if page.layout == "post" %}
      <!-- post 레이아웃을 사용하는 페이지는 사이드바 구조를 포함하므로 content를 바로 출력 -->
      {{ content }}
    {% else %}
      <!-- 그 외 모든 페이지(홈, 카테고리 등)는 content-wrapper로 감싸서 중앙 정렬 -->
      <div class="content-wrapper">
        {{ content }}
      </div>
    {% endif %}
  </main>

  {% include footer.html %}

  <a id="back-to-top" href="#">↑</a>
  <script src="{{ '/assets/js/script.js' | relative_url }}"></script>
</body>
</html>
