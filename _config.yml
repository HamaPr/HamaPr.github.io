title: HamaP의 블로그
description: 해킹과 보안, 클라우드 공부 기록
author: HamaP
baseurl: ""
url: "https://hamapr.github.io"

markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives

future: false

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      primary_category: "uncategorized"

jekyll-archives:
  enabled:
    - categories
  layouts:
    category: category_page
  permalinks:
    category: '/category/:name/'

category_names:
  owasp-top-10: "OWASP Top 10"
  security-architecture: "보안 아키텍처"
  penetration-test-scenario: "모의침투 시나리오"
  system-hacking: "시스템 해킹"
  web-technology: "웹 기술"
  web-hacking: "웹 해킹"
  app-hacking: "앱 해킹"
  certificates: "자격증"
  hacking-tools: "해킹 툴"
  ngfw: "NGFW"
  bandit: "Bandit"
  att-ck: "ATT&CK"
  cyber-kill-chain: "Cyber Kill Chain"